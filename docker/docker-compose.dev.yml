services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autoparts
      POSTGRES_USER: autoparts
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoparts_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoparts"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
