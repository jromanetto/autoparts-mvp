services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: autoparts
      POSTGRES_USER: autoparts
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoparts"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://autoparts:${POSTGRES_PASSWORD}@postgres:5432/autoparts
      PORT: 3000
      HOST: 0.0.0.0
      LOG_LEVEL: info
      API_BASE_URL: https://${DOMAIN:?DOMAIN is required}
      CORS_ORIGIN: https://${DOMAIN}
      API_KEYS: ${API_KEYS:?API_KEYS is required}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./nginx/conf.d/api.conf.template:/etc/nginx/templates/api.conf.template:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - internal

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrate
    environment:
      DATABASE_URL: postgres://autoparts:${POSTGRES_PASSWORD}@postgres:5432/autoparts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - migrate

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

volumes:
  postgres_data:
  certbot_webroot:
  certbot_certs:

networks:
  internal:
    driver: bridge
