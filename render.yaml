# Render Blueprint — one-click deploy for AutoParts
# Deploy: https://render.com/deploy?repo=https://github.com/jromanetto/autoparts-mvp

databases:
  - name: autoparts-db
    plan: free
    databaseName: autoparts
    user: autoparts

services:
  - type: web
    name: autoparts-api
    plan: free
    runtime: node
    buildCommand: corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install --frozen-lockfile && pnpm turbo run build
    preDeployCommand: pnpm db:migrate && pnpm db:seed
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autoparts-db
          property: connectionString
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: "*"
      - key: API_KEYS
        value: ""
      - key: NODE_VERSION
        value: "22.14.0"
    healthCheckPath: /health

  - type: web
    name: autoparts-web
    plan: free
    runtime: node
    buildCommand: >-
      corepack enable && corepack prepare pnpm@9.15.4 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm turbo run build --filter=@autoparts/web... &&
      cp -r apps/web/public apps/web/.next/standalone/apps/web/public &&
      cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
    startCommand: node apps/web/.next/standalone/apps/web/server.js
    envVars:
      - key: INTERNAL_API_URL
        fromService:
          type: web
          name: autoparts-api
          property: host
      - key: PORT
        value: "10000"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.14.0"
